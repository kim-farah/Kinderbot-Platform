<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinderbot Login</title>
    <style>
        :root {
            --dark-blue: #1E3A5F;
            --orange: #FF6B35;
            --white: #FFFFFF;
            --light-gray: #F5F5F5;
            --gray: #707070;
            --border-gray: #E0E0E0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', 'Segoe UI', 'Inter', sans-serif;
            background: var(--light-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 420px;
            text-align: center;
        }
        h1 {
            color: var(--dark-blue);
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        h2 {
            color: var(--dark-blue);
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 30px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--dark-blue);
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-gray);
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--orange);
        }
        .login-btn {
            background: var(--orange);
            color: var(--white);
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .login-btn:hover {
            opacity: 0.9;
        }
        .demo-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border-gray);
        }
        .demo-title {
            font-size: 13px;
            color: var(--gray);
            margin-bottom: 12px;
        }
        .demo-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .demo-link {
            color: var(--orange);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 20px;
            background: #FFF4E5;
            transition: all 0.2s;
            cursor: pointer;
        }
        .demo-link:hover {
            background: var(--orange);
            color: white;
        }
        .error-message {
            color: #dc3545;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🤖 Kinderbot</h1>
        <h2>Welcome back!</h2>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="teacher@school.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>

        <button class="login-btn" id="loginBtn">Login</button>
        <div id="errorMessage" class="error-message"></div>

        
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            if (!email || !password) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = '❌ Please enter both email and password';
                return;
            }
            
            errorDiv.style.display = 'none';
            
            if (email.includes('coordinator')) {
                localStorage.setItem('token', 'demo-token-coordinator');
                localStorage.setItem('user', JSON.stringify({ email, role: 'coordinator', name: 'Coordinator' }));
                window.location.href = 'coordinator.html';
            } 
            else if (email.includes('teacher')) {
                localStorage.setItem('token', 'demo-token-teacher');
                localStorage.setItem('user', JSON.stringify({ email, role: 'teacher', name: 'Ms. Sara' }));
                window.location.href = 'teacher.html';
            } 
            else if (email.includes('parent')) {
                localStorage.setItem('token', 'demo-token-parent');
                localStorage.setItem('user', JSON.stringify({ email, role: 'parent', name: 'Parent' }));
                window.location.href = 'parent.html';
            } 
            else {
                errorDiv.style.display = 'block';
                errorDiv.textContent = '❌ Demo: Use email with "coordinator", "teacher", or "parent"';
            }
        });
        

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>
</body>
</html>
